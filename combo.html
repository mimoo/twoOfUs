<style>
  /* combo-page palette: cream cousin with warm neutrals across all three quizzes */
  :root {
    --bg: #FFF1E0;
    --ink: #14131F;
    --accent: #14131F;
    --accent-soft: #ECE3D2;
    --p2-color: #14131F;

    --opt1-bg: #fff;
    --opt2-bg: #fff;

    --quad-tl: #ECE3D2;
    --quad-tr: #ECE3D2;
    --quad-bl: #ECE3D2;
    --quad-br: #ECE3D2;

    --bg-glow-1: rgba(255,77,126,0.08);
    --bg-glow-2: rgba(214,118,81,0.10);

    --ink-soft:  rgba(20,19,31,0.72);
    --ink-muted: rgba(20,19,31,0.55);
    --ink-faint: rgba(20,19,31,0.45);
    --ink-fade:  rgba(20,19,31,0.28);
    --ink-tint:  rgba(20,19,31,0.08);

    /* per-quiz accents (mirrored from index.html) */
    --q1-accent: #FF4D7E;
    --q1-pink-soft: #FFDDE6;
    --q1-mint: #B8E8C8;
    --q1-yellow: #FFD66B;
    --q1-lilac: #E8DFFF;

    --q2-accent: #FF3D2E;
    --q2-hot-soft: #FFD6CF;
    --q2-sky: #9FD8FF;
    --q2-sun: #FFC93C;
    --q2-paper: #F4EFE6;

    --q3-accent: #D67651;
    --q3-clay-soft: #F4D4C2;
    --q3-sage: #B8D8D3;
    --q3-butter: #F0D88A;
    --q3-lavender: #C9C2DD;
  }

  body { background: var(--bg); }
  .stage { max-width: 720px; padding-top: 36px; padding-bottom: 60px; }

  .combo-hero { margin-bottom: 28px; }
  .combo-hero .eyebrow { color: var(--q3-accent); }
  .combo-hero h1 {
    font-family: 'Fraunces', serif;
    font-style: italic; font-weight: 700;
    font-size: clamp(40px, 10vw, 60px);
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin-bottom: 14px;
  }
  .combo-hero h1 em { color: var(--q1-accent); font-style: italic; }
  .combo-hero .lede {
    font-size: 16px; line-height: 1.55;
    color: var(--ink-soft); max-width: 46ch;
  }

  /* share button row */
  .combo-share {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .combo-share .btn {
    display: inline-block; width: auto; flex: 0 0 auto;
    padding: 12px 22px; font-size: 13px;
  }
  .combo-share .btn.secondary { margin-top: 0; }
  .combo-share .share-confirm {
    align-self: center;
    height: auto;
    margin: 0;
  }

  /* quiz block grid: stacked on mobile, three across on desktop */
  .combo-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 22px;
  }
  @media (min-width: 760px) {
    .combo-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .combo-block {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 22px;
    padding: 22px 22px 20px;
    box-shadow: 5px 5px 0 var(--ink);
    display: flex;
    flex-direction: column;
  }
  .combo-block.q1 { box-shadow: 5px 5px 0 var(--q1-accent); }
  .combo-block.q2 { box-shadow: 5px 5px 0 var(--q2-accent); }
  .combo-block.q3 { box-shadow: 5px 5px 0 var(--q3-accent); }

  .combo-block .part {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .combo-block.q1 .part { color: var(--q1-accent); }
  .combo-block.q2 .part { color: var(--q2-accent); }
  .combo-block.q3 .part { color: var(--q3-accent); }

  .combo-block h2 {
    font-family: 'Fraunces', serif;
    font-style: italic; font-weight: 700;
    font-size: 24px;
    line-height: 1.05;
    letter-spacing: -0.018em;
    margin-bottom: 6px;
  }
  .combo-block.q1 h2 em { color: var(--q1-accent); font-style: italic; }
  .combo-block.q2 h2 em { color: var(--q2-accent); font-style: italic; }
  .combo-block.q3 h2 em { color: var(--q3-accent); font-style: italic; }

  .combo-axes {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 14px;
  }

  /* mini scaled chart per block (re-uses .chart-grid + .dot from shared.css) */
  .combo-block .chart-wrap { margin: 0 0 14px; padding: 0; }
  .combo-block .chart-axis-top,
  .combo-block .chart-axis-bottom { font-size: 9px; letter-spacing: 0.18em; }
  .combo-block .chart-axis-side { font-size: 9px; letter-spacing: 0.18em; }
  .combo-block .chart-grid {
    box-shadow: 3px 3px 0 var(--ink);
  }
  .combo-block .quadrant .qname { font-size: 11px; }
  .combo-block .dot { width: 11px; height: 11px; }
  .combo-block .dot-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 3px 6px;
  }
  .combo-block .legend {
    grid-template-columns: 1fr;
    gap: 4px 10px;
    font-size: 10px;
    margin-top: 10px;
  }
  .combo-block .legend-swatch { width: 10px; height: 10px; }

  /* per-quiz quadrant tints inside the block */
  .combo-block.q1 .quadrant.tl { background: var(--q1-mint); }
  .combo-block.q1 .quadrant.tr { background: var(--q1-pink-soft); }
  .combo-block.q1 .quadrant.bl { background: var(--q1-lilac); }
  .combo-block.q1 .quadrant.br { background: var(--q1-yellow); }
  .combo-block.q1 .dot.p2 { background: var(--q1-accent); }
  .combo-block.q1 .dot-label.p2 { background: var(--q1-accent); }
  .combo-block.q1 .dot.hollow.p2 { border-color: var(--q1-accent); background: white; }
  .combo-block.q1 .dot-label.hollow.p2 { color: var(--q1-accent); border-color: var(--q1-accent); }
  .combo-block.q1 .legend-swatch.p2 { background: var(--q1-accent); }
  .combo-block.q1 .legend-swatch.hollow.p2 { background: white; border-color: var(--q1-accent); }

  .combo-block.q2 .quadrant.tl { background: var(--q2-sky); }
  .combo-block.q2 .quadrant.tr { background: var(--q2-hot-soft); }
  .combo-block.q2 .quadrant.bl { background: var(--q2-paper); }
  .combo-block.q2 .quadrant.br { background: var(--q2-sun); }
  .combo-block.q2 .dot.p2 { background: var(--q2-accent); }
  .combo-block.q2 .dot-label.p2 { background: var(--q2-accent); }
  .combo-block.q2 .dot.hollow.p2 { border-color: var(--q2-accent); background: white; }
  .combo-block.q2 .dot-label.hollow.p2 { color: var(--q2-accent); border-color: var(--q2-accent); }
  .combo-block.q2 .legend-swatch.p2 { background: var(--q2-accent); }
  .combo-block.q2 .legend-swatch.hollow.p2 { background: white; border-color: var(--q2-accent); }

  .combo-block.q3 .quadrant.tl { background: var(--q3-sage); }
  .combo-block.q3 .quadrant.tr { background: var(--q3-clay-soft); }
  .combo-block.q3 .quadrant.bl { background: var(--q3-lavender); }
  .combo-block.q3 .quadrant.br { background: var(--q3-butter); }
  .combo-block.q3 .dot.p2 { background: var(--q3-accent); }
  .combo-block.q3 .dot-label.p2 { background: var(--q3-accent); }
  .combo-block.q3 .dot.hollow.p2 { border-color: var(--q3-accent); background: white; }
  .combo-block.q3 .dot-label.hollow.p2 { color: var(--q3-accent); border-color: var(--q3-accent); }
  .combo-block.q3 .legend-swatch.p2 { background: var(--q3-accent); }
  .combo-block.q3 .legend-swatch.hollow.p2 { background: white; border-color: var(--q3-accent); }

  /* verdict line per block */
  .combo-verdict {
    font-size: 13px; line-height: 1.45;
    color: var(--ink-soft);
    margin-top: 6px;
  }
  .combo-verdict strong { color: var(--ink); font-family: 'Fraunces', serif; font-style: italic; font-weight: 700; }

  /* placeholder for missing quizzes */
  .combo-block.placeholder {
    background: var(--ink-tint);
    border-style: dashed;
    box-shadow: none;
    align-items: stretch;
    justify-content: space-between;
  }
  .combo-block.placeholder .placeholder-msg {
    font-size: 13px; line-height: 1.5;
    color: var(--ink-muted);
    margin: 14px 0;
    flex: 1;
  }
  .combo-block.placeholder a.take-link {
    display: inline-block;
    background: var(--ink); color: var(--bg);
    border: 2px solid var(--ink);
    border-radius: 999px;
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    text-decoration: none;
    text-align: center;
  }

  /* error state shown when payload is malformed */
  .combo-error {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 22px;
    padding: 24px;
    box-shadow: 5px 5px 0 var(--ink);
    text-align: center;
  }
  .combo-error h2 {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 28px; margin-bottom: 8px;
  }
  .combo-error p {
    color: var(--ink-soft); font-size: 14px; line-height: 1.5;
    margin-bottom: 14px;
  }
  .combo-error a {
    display: inline-block; padding: 12px 22px;
    background: var(--ink); color: var(--bg);
    border: 2px solid var(--ink); border-radius: 999px;
    text-decoration: none;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .combo-foot {
    text-align: center; margin-top: 40px;
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 13px; color: var(--ink-faint);
  }
  .combo-foot a {
    color: var(--ink-soft); text-decoration: underline;
  }
</style>

<script>
(function () {
  'use strict';

  // ─── Per-quiz config (mirrors what's in each quiz HTML's window.QUIZ) ─────
  // We only need axes, archetypes, quadLabels, title — no questions.
  const QUIZZES = {
    relationship: {
      id: 'relationship',
      title: 'Who does <em>what</em>?',
      part: 'Part I',
      page: 'relationship-quiz.html',
      cls: 'q1',
      axes: {
        y: { pos: 'mother', neg: 'baby',  posLabel: 'Mother', negLabel: 'Baby' },
        x: { pos: 'tyrant', neg: 'serf',  posLabel: 'Tyrant', negLabel: 'Serf' },
      },
      archetypes: {
        'mother+tyrant': { emoji: '👑🍼', name: 'The Matriarch' },
        'mother+serf':   { emoji: '🌷',   name: 'The Caretaker' },
        'baby+tyrant':   { emoji: '👶👑', name: 'The Royal Baby' },
        'baby+serf':     { emoji: '🐶',   name: 'The Puppy' },
      },
      quadLabels: { tl: 'Caretaker', tr: 'Matriarch', bl: 'Puppy', br: 'Royal Baby' },
    },
    leader: {
      id: 'leader',
      title: 'Who <em>leads</em>, who plays?',
      part: 'Part II',
      page: 'leader-quiz.html',
      cls: 'q2',
      axes: {
        y: { pos: 'dom', neg: 'sub',    posLabel: 'Dom', negLabel: 'Sub' },
        x: { pos: 'fun', neg: 'boring', posLabel: 'Fun', negLabel: 'Boring' },
      },
      archetypes: {
        'dom+fun':    { emoji: '🎪',  name: 'The Ringleader' },
        'dom+boring': { emoji: '📋',  name: 'The Manager' },
        'sub+fun':    { emoji: '🎉',  name: 'The Hype Person' },
        'sub+boring': { emoji: '🛋️', name: 'The Anchor' },
      },
      quadLabels: { tl: 'Manager', tr: 'Ringleader', bl: 'Anchor', br: 'Hype Person' },
    },
    grownup: {
      id: 'grownup',
      title: "Who's the <em>grown-up</em>?",
      part: 'Part III',
      page: 'grownup-quiz.html',
      cls: 'q3',
      axes: {
        y: { pos: 'mature', neg: 'immature', posLabel: 'Mature', negLabel: 'Immature' },
        x: { pos: 'aware',  neg: 'unaware',  posLabel: 'Aware',  negLabel: 'Unaware'  },
      },
      archetypes: {
        'mature+aware':    { emoji: '🦉',  name: 'The Sage' },
        'mature+unaware':  { emoji: '🌿',  name: 'The Mellow' },
        'immature+aware':  { emoji: '📓',  name: 'The Diarist' },
        'immature+unaware':{ emoji: '⛈️', name: 'The Storm' },
      },
      quadLabels: { tl: 'The Mellow', tr: 'The Sage', bl: 'The Storm', br: 'The Diarist' },
    },
  };

  const ORDER = ['relationship', 'leader', 'grownup'];

  // ─── base64url JSON ─────────────────────────────────────────────────────
  function b64urlEncode(obj) {
    const json = JSON.stringify(obj);
    const utf8 = unescape(encodeURIComponent(json));
    let b64;
    try { b64 = btoa(utf8); } catch (e) { b64 = btoa(json); }
    return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  function b64urlDecode(str) {
    let s = String(str).replace(/-/g, '+').replace(/_/g, '/');
    const pad = s.length % 4;
    if (pad) s += '='.repeat(4 - pad);
    let utf8;
    try { utf8 = atob(s); } catch (e) { return null; }
    let json;
    try { json = decodeURIComponent(escape(utf8)); } catch (e) { json = utf8; }
    try { return JSON.parse(json); } catch (e) { return null; }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  // ─── Score/plot helpers (mirror engine.js) ──────────────────────────────
  function arrayToScore(arr, axes) {
    const order = [axes.y.pos, axes.y.neg, axes.x.pos, axes.x.neg];
    const s = {};
    order.forEach((k, i) => { s[k] = (arr && arr[i]) || 0; });
    return s;
  }
  function netY(s, axes) { return (s[axes.y.pos] || 0) - (s[axes.y.neg] || 0); }
  function netX(s, axes) { return (s[axes.x.pos] || 0) - (s[axes.x.neg] || 0); }
  function plotPercent(s, axes) {
    const margin = 14;
    const yNet = Math.max(-1, Math.min(1, netY(s, axes) / 6));
    const xNet = Math.max(-1, Math.min(1, netX(s, axes) / 6));
    return {
      x: 50 + xNet * (50 - margin),
      y: 50 - yNet * (50 - margin),
    };
  }
  function assignQuadrants(s1, s2, axes) {
    const yN1 = netY(s1, axes), yN2 = netY(s2, axes);
    let p1Y;
    if (yN1 > yN2) p1Y = true;
    else if (yN1 < yN2) p1Y = false;
    else p1Y = (s1[axes.y.pos] || 0) >= (s2[axes.y.pos] || 0);

    const xN1 = netX(s1, axes), xN2 = netX(s2, axes);
    let p1X;
    if (xN1 > xN2) p1X = true;
    else if (xN1 < xN2) p1X = false;
    else p1X = (s1[axes.x.pos] || 0) >= (s2[axes.x.pos] || 0);

    return {
      p1: { yPos: p1Y, xPos: p1X },
      p2: { yPos: !p1Y, xPos: !p1X },
    };
  }
  function archetypeFor(quiz, yPos, xPos) {
    const key = (yPos ? quiz.axes.y.pos : quiz.axes.y.neg) + '+' +
                (xPos ? quiz.axes.x.pos : quiz.axes.x.neg);
    return quiz.archetypes[key] || { emoji: '✨', name: 'Unclassifiable' };
  }

  // ─── Render one quiz block ──────────────────────────────────────────────
  function renderBlock(quizKey, sub, n1, n2) {
    const quiz = QUIZZES[quizKey];

    // Determine if it's together-mode (a1, a2) or compared-mode (a1byA, a2byA, a1byB, a2byB).
    let dots = [];
    let verdictLine = '';
    let isCompared = false;

    if (sub.a1byA && sub.a2byA && sub.a1byB && sub.a2byB) {
      isCompared = true;
      const sAA = arrayToScore(sub.a1byA, quiz.axes);
      const sBA = arrayToScore(sub.a2byA, quiz.axes);
      const sAB = arrayToScore(sub.a1byB, quiz.axes);
      const sBB = arrayToScore(sub.a2byB, quiz.axes);
      const pAA = plotPercent(sAA, quiz.axes);
      const pBA = plotPercent(sBA, quiz.axes);
      const pAB = plotPercent(sAB, quiz.axes);
      const pBB = plotPercent(sBB, quiz.axes);
      dots = [
        { id: `${quizKey}-d-aa`, cls: 'p1',         label: n1, x: pAA.x, y: pAA.y },
        { id: `${quizKey}-d-ba`, cls: 'p2',         label: n2, x: pBA.x, y: pBA.y },
        { id: `${quizKey}-d-ab`, cls: 'p1 hollow',  label: n1, x: pAB.x, y: pAB.y },
        { id: `${quizKey}-d-bb`, cls: 'p2 hollow',  label: n2, x: pBB.x, y: pBB.y },
      ];
      // Take majority view for verdict line: if both views agree, use that. Else "split".
      const viewA = assignQuadrants(sAA, sBA, quiz.axes);
      const viewB = assignQuadrants(sAB, sBB, quiz.axes);
      const a1A = archetypeFor(quiz, viewA.p1.yPos, viewA.p1.xPos);
      const a1B = archetypeFor(quiz, viewB.p1.yPos, viewB.p1.xPos);
      const a2A = archetypeFor(quiz, viewA.p2.yPos, viewA.p2.xPos);
      const a2B = archetypeFor(quiz, viewB.p2.yPos, viewB.p2.xPos);
      const sameForN1 = a1A.name === a1B.name;
      const sameForN2 = a2A.name === a2B.name;
      const n1Phrase = sameForN1
        ? `${a1A.emoji} <strong>${escapeHtml(a1A.name)}</strong>`
        : `<strong>${escapeHtml(a1A.name)}</strong> / <strong>${escapeHtml(a1B.name)}</strong> (split)`;
      const n2Phrase = sameForN2
        ? `${a2A.emoji} <strong>${escapeHtml(a2A.name)}</strong>`
        : `<strong>${escapeHtml(a2A.name)}</strong> / <strong>${escapeHtml(a2B.name)}</strong> (split)`;
      verdictLine = `${escapeHtml(n1)} — ${n1Phrase}<br>${escapeHtml(n2)} — ${n2Phrase}`;
    } else if (sub.a1 && sub.a2) {
      const s1 = arrayToScore(sub.a1, quiz.axes);
      const s2 = arrayToScore(sub.a2, quiz.axes);
      const p1 = plotPercent(s1, quiz.axes);
      const p2 = plotPercent(s2, quiz.axes);
      dots = [
        { id: `${quizKey}-d1`, cls: 'p1', label: n1, x: p1.x, y: p1.y },
        { id: `${quizKey}-d2`, cls: 'p2', label: n2, x: p2.x, y: p2.y },
      ];
      const assigned = assignQuadrants(s1, s2, quiz.axes);
      const a1 = archetypeFor(quiz, assigned.p1.yPos, assigned.p1.xPos);
      const a2 = archetypeFor(quiz, assigned.p2.yPos, assigned.p2.xPos);
      verdictLine =
        `${escapeHtml(n1)} — ${a1.emoji} <strong>${escapeHtml(a1.name)}</strong><br>` +
        `${escapeHtml(n2)} — ${a2.emoji} <strong>${escapeHtml(a2.name)}</strong>`;
    } else {
      return renderPlaceholder(quizKey);
    }

    const ax = quiz.axes;
    const ql = quiz.quadLabels;
    const dotsHtml = dots.map((d) => `
      <div class="dot ${d.cls}" id="${d.id}"></div>
      <div class="dot-label ${d.cls}" id="${d.id}-label">${escapeHtml(d.label)}</div>
    `).join('');

    let legendHtml = '';
    if (isCompared) {
      legendHtml = `
        <div class="legend">
          <div class="legend-row"><span class="legend-swatch p1"></span>${escapeHtml(n1)} by ${escapeHtml(n1)}</div>
          <div class="legend-row"><span class="legend-swatch p2"></span>${escapeHtml(n2)} by ${escapeHtml(n1)}</div>
          <div class="legend-row"><span class="legend-swatch p1 hollow"></span>${escapeHtml(n1)} by ${escapeHtml(n2)}</div>
          <div class="legend-row"><span class="legend-swatch p2 hollow"></span>${escapeHtml(n2)} by ${escapeHtml(n2)}</div>
        </div>
      `;
    }

    const blockHtml = `
      <div class="combo-block ${quiz.cls}" data-quiz="${quizKey}">
        <div class="part">${quiz.part}</div>
        <h2>${quiz.title}</h2>
        <div class="combo-axes">${escapeHtml(ax.y.posLabel)} · ${escapeHtml(ax.y.negLabel)} × ${escapeHtml(ax.x.negLabel)} · ${escapeHtml(ax.x.posLabel)}</div>

        <div class="chart-wrap">
          <div class="chart-axis-top">${escapeHtml(ax.y.posLabel)}</div>
          <div class="chart-row">
            <div class="chart-axis-side left">${escapeHtml(ax.x.negLabel)}</div>
            <div class="chart-grid" id="${quizKey}-chart">
              <div class="quadrant tl"><span class="qname">${escapeHtml(ql.tl)}</span></div>
              <div class="quadrant tr"><span class="qname">${escapeHtml(ql.tr)}</span></div>
              <div class="quadrant bl"><span class="qname">${escapeHtml(ql.bl)}</span></div>
              <div class="quadrant br"><span class="qname">${escapeHtml(ql.br)}</span></div>
              <div class="grid-line h"></div>
              <div class="grid-line v"></div>
              ${dotsHtml}
            </div>
            <div class="chart-axis-side right">${escapeHtml(ax.x.posLabel)}</div>
          </div>
          <div class="chart-axis-bottom">${escapeHtml(ax.y.negLabel)}</div>
        </div>

        ${legendHtml}

        <p class="combo-verdict">${verdictLine}</p>
      </div>
    `;

    return { html: blockHtml, dots };
  }

  function renderPlaceholder(quizKey) {
    const quiz = QUIZZES[quizKey];
    const html = `
      <div class="combo-block placeholder ${quiz.cls}">
        <div class="part">${quiz.part}</div>
        <h2>${quiz.title}</h2>
        <p class="placeholder-msg">Not yet taken. Take it together or pass a link back and forth.</p>
        <a class="take-link" href="${quiz.page}">Take it →</a>
      </div>
    `;
    return { html, dots: [] };
  }

  // ─── Position dots after layout ────────────────────────────────────────
  function positionDot(id, pos) {
    const dot = document.getElementById(id);
    const lbl = document.getElementById(id + '-label');
    if (dot) {
      dot.style.left = pos.x + '%';
      dot.style.top = pos.y + '%';
    }
    if (lbl) {
      lbl.style.left = pos.x + '%';
      lbl.style.top = pos.y + '%';
    }
  }

  // ─── Read hash ─────────────────────────────────────────────────────────
  function readHash() {
    const h = window.location.hash || '';
    if (h.startsWith('#trio=')) {
      const data = b64urlDecode(h.slice('#trio='.length));
      if (data && data.m === 'trio') return data;
    }
    return null;
  }

  function showError(msg) {
    const el = document.getElementById('comboError');
    el.style.display = '';
    el.innerHTML = `
      <div class="combo-error">
        <h2>Couldn't read that link.</h2>
        <p>${escapeHtml(msg)}</p>
        <a href="index.html">Back to start</a>
      </div>
    `;
    document.getElementById('comboGrid').style.display = 'none';
  }

  function showEmptyState() {
    // No payload → invite user to take quizzes (placeholder for all three).
    const grid = document.getElementById('comboGrid');
    let html = '';
    ORDER.forEach((k) => { html += renderPlaceholder(k).html; });
    grid.innerHTML = html;
  }

  // ─── Share button ──────────────────────────────────────────────────────
  function copyToClipboard(url, onDone) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(onDone, () => fallbackCopy(url, onDone));
    } else {
      fallbackCopy(url, onDone);
    }
  }
  function fallbackCopy(text, cb) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    if (cb) cb();
  }
  function wireShare(payload) {
    const url = location.origin + location.pathname + '#trio=' + b64urlEncode(payload);
    const row = document.getElementById('comboShare');
    row.style.display = '';
    document.getElementById('copyComboBtn').addEventListener('click', () => {
      const doShare = (u) => {
        if (navigator.share) {
          navigator.share({ title: 'Two of Us — combo', url: u }).catch(() => copyToClipboard(u, showCopied));
        } else {
          copyToClipboard(u, showCopied);
        }
      };
      doShare(url);
    });
    function showCopied() {
      const c = document.getElementById('comboShareConfirm');
      c.classList.add('show');
      setTimeout(() => c.classList.remove('show'), 2400);
    }
  }

  // ─── Boot ──────────────────────────────────────────────────────────────
  function boot() {
    const data = readHash();
    if (!data) {
      showEmptyState();
      return;
    }
    if (data.v !== 1) {
      showError('Unknown payload version.');
      return;
    }

    const n1 = data.n1 || 'Person 1';
    const n2 = data.n2 || 'Person 2';

    const grid = document.getElementById('comboGrid');
    let html = '';
    const allDots = [];
    let presentCount = 0;

    ORDER.forEach((k) => {
      const sub = data[k];
      let block;
      if (sub && typeof sub === 'object') {
        block = renderBlock(k, sub, n1, n2);
        if (block.dots.length) presentCount++;
      } else {
        block = renderPlaceholder(k);
      }
      html += block.html;
      block.dots.forEach((d) => allDots.push(d));
    });

    grid.innerHTML = html;

    // Position dots after the DOM is updated.
    requestAnimationFrame(() => {
      allDots.forEach((d) => positionDot(d.id, { x: d.x, y: d.y }));
    });

    if (presentCount > 0) {
      // Only wire share once we have something worth sharing.
      wireShare(data);
    }
  }

  // ─── Listen for hash changes too ───────────────────────────────────────
  window.addEventListener('hashchange', () => window.location.reload());

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>

</body>
</html>
