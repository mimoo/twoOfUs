<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Who leads, who plays?</title>

<!-- Open Graph / Twitter -->
<!-- TODO: replace og:url content with your deployed URL once you have one -->
<meta property="og:type" content="website">
<meta property="og:url" content="">
<meta property="og:title" content="Who leads, who plays — Two of Us, Part II">
<meta property="og:description" content="Dom, sub, fun, boring. Who runs the night and who's checking the time at the party.">
<meta property="og:image" content="og-leader.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Who leads, who plays — Two of Us, Part II">
<meta name="twitter:description" content="Dom, sub, fun, boring. Who runs the night and who's checking the time at the party.">
<meta name="twitter:image" content="og-leader.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  /* per-quiz palette overrides only — everything else lives in shared.css */
  :root {
    --bg: #F4EFE6;
    --ink: #14131F;
    --accent: #FF3D2E;
    --accent-soft: #FFD6CF;
    --p2-color: #FF3D2E;

    --opt1-bg: #FFD6CF;       /* hot-soft */
    --opt2-bg: #C8F25A;       /* lime */

    --quad-tl: #9FD8FF;       /* Manager — sky (dom + boring) */
    --quad-tr: #FFD6CF;       /* Ringleader — hot-soft (dom + fun) */
    --quad-bl: #F4EFE6;       /* Anchor — cream (sub + boring) */
    --quad-br: #FFC93C;       /* Hype Person — sun (sub + fun) */

    --bg-glow-1: rgba(255,61,46,0.10);
    --bg-glow-2: rgba(159,216,255,0.28);

    --ink-soft:  rgba(20,19,31,0.72);
    --ink-muted: rgba(20,19,31,0.55);
    --ink-faint: rgba(20,19,31,0.45);
    --ink-fade:  rgba(20,19,31,0.28);
    --ink-tint:  rgba(20,19,31,0.08);
  }
  /* archetype-specific verdict tints */
  .verdict.ringleader { background: var(--quad-tr); }
  .verdict.manager    { background: var(--quad-tl); }
  .verdict.hype       { background: var(--quad-br); }
  .verdict.anchor     { background: white; }
</style>
</head>
<body>
<div class="stage">

  <!-- INTRO -->
  <section class="screen active" id="screen-intro">
    <div class="eyebrow" id="introEyebrow">Part two — the sequel</div>
    <h1 class="title" id="introTitle">Who <em>leads</em>, who plays?</h1>
    <p class="lede" id="introLede">Twenty-four questions on two new axes — who takes the lead (dom / sub) and who's the energy in the room (fun / boring). No judgment. Mostly.</p>

    <div class="modes" role="radiogroup" aria-label="Quiz mode">
      <button class="mode-btn selected" data-mode="together" type="button">
        <span class="mode-label">Together</span>
        <span class="mode-name">One device</span>
        <span class="mode-sub">Both of you, answering side by side.</span>
      </button>
      <button class="mode-btn" data-mode="solo-sender" type="button">
        <span class="mode-label">Solo</span>
        <span class="mode-name">Compare separately</span>
        <span class="mode-sub">You first, then send a link to your partner.</span>
      </button>
    </div>

    <div class="name-fields">
      <div class="field">
        <label id="label-name1">Person 1</label>
        <input id="name1" type="text" placeholder="Their name" maxlength="18" autocomplete="off" />
      </div>
      <div class="field">
        <label id="label-name2">Person 2</label>
        <input id="name2" type="text" placeholder="Your name" maxlength="18" autocomplete="off" />
      </div>
    </div>
    <button class="btn" id="beginBtn">Begin →</button>
  </section>

  <!-- QUESTION -->
  <section class="screen" id="screen-question">
    <div class="q-header">
      <div class="q-count" id="qCount">01 / 24</div>
      <div class="progress"><div class="progress-bar" id="progBar"></div></div>
    </div>
    <div class="q-pov" id="qPov" style="display:none;"></div>
    <h2 class="question" id="qText">…</h2>
    <div class="options">
      <button class="option" id="opt1"></button>
      <button class="option" id="opt2"></button>
    </div>
    <button class="tie-link" id="tieBtn">Honestly equal — skip</button>
  </section>

  <!-- RESULTS (rendered by engine.js into #resultsContainer) -->
  <section class="screen" id="screen-results">
    <div id="resultsContainer"></div>
  </section>

</div>

<script>
window.QUIZ = {
  id: "leader",
  title: 'Who <em>leads</em>, who plays?',
  intro: "Twenty-four questions on two new axes — who takes the lead (dom / sub) and who's the energy in the room (fun / boring). No judgment. Mostly.",

  axes: {
    // Y-axis: top vs bottom of chart.
    y: { pos: "dom", neg: "sub",    posLabel: "Dom", negLabel: "Sub" },
    // X-axis: right vs left of chart.
    x: { pos: "fun", neg: "boring", posLabel: "Fun", negLabel: "Boring" },
  },

  questions: [
    { text: "Who makes the first move?",                                       axis: "dom"    },
    { text: "Who suggests 'let's just go right now' to a random plan?",        axis: "fun"    },
    { text: "Who asks 'what do you want to do tonight?'",                      axis: "sub"    },
    { text: "Who says 'we should head home soon'?",                            axis: "boring" },

    { text: "Who plans the date?",                                             axis: "dom"    },
    { text: "Who orders dessert?",                                             axis: "fun"    },
    { text: "Who waits for the other to text first?",                          axis: "sub"    },
    { text: "Who's checking the time at the party?",                           axis: "boring" },

    { text: "Who initiates the difficult conversation?",                       axis: "dom"    },
    { text: "Who starts dancing first?",                                       axis: "fun"    },
    { text: "Who lets the other order for them?",                              axis: "sub"    },
    { text: "Who orders the safe option on the menu?",                         axis: "boring" },

    { text: "Who picks up the menu first and starts deciding?",                axis: "dom"    },
    { text: "Who talks to strangers at the bar?",                              axis: "fun"    },
    { text: "Who follows the other's lead in unfamiliar settings?",            axis: "sub"    },
    { text: "Who says 'maybe tomorrow' to the spontaneous thing?",             axis: "boring" },

    { text: "Who sets the pace of the relationship?",                          axis: "dom"    },
    { text: "Who's first in the pool, ocean, or onto the dance floor?",        axis: "fun"    },
    { text: "Who agrees to the plan without weighing in?",                     axis: "sub"    },
    { text: "Who's in bed by 11?",                                             axis: "boring" },

    { text: "Who decides 'okay, we're doing this' when the group is stalling?", axis: "dom"   },
    { text: "Who pushes for 'one more drink, one more song'?",                 axis: "fun"    },
    { text: "Who waits to be told it's time to leave?",                        axis: "sub"    },
    { text: "Who declines the invitation when they're tired?",                 axis: "boring" }
  ],

  // Keyed "<yKey>+<xKey>": 4 combinations.
  archetypes: {
    "dom+fun": {
      emoji: "🎪",
      name: "The Ringleader",
      blurb: "Drags everyone out, picks the venue, last to leave. The chaos has a captain — and it's them.",
      klass: "ringleader"
    },
    "dom+boring": {
      emoji: "📋",
      name: "The Manager",
      blurb: "Has opinions about bedtime. Runs a tight ship. The plan is the fun, and the plan ends at 10:30.",
      klass: "manager"
    },
    "sub+fun": {
      emoji: "🎉",
      name: "The Hype Person",
      blurb: "Wouldn't suggest it themselves, but a hard yes to every chaotic idea. Best wingman energy.",
      klass: "hype"
    },
    "sub+boring": {
      emoji: "🛋️",
      name: "The Anchor",
      blurb: "Reliable, low-key, perfectly content on the couch. The voice of reason that quietly vetoes the late-night plan.",
      klass: "anchor"
    }
  },

  quadLabels: {
    tl: "Manager",
    tr: "Ringleader",
    bl: "Anchor",
    br: "Hype Person"
  },

  copy: {
    eyebrow: "Part two — the sequel",
    resultsHead: "Here's the <em>truth</em>.",
    footerNote: "Diagnosis is non-binding. Probably."
  }
};
</script>
<script src="engine.js"></script>
</body>
</html>
