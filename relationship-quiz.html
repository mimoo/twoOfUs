<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Who does what in the relationship?</title>

<!-- Open Graph / Twitter -->
<!-- TODO: replace og:url content with your deployed URL once you have one -->
<meta property="og:type" content="website">
<meta property="og:url" content="">
<meta property="og:title" content="Who does what — Two of Us, Part I">
<meta property="og:description" content="Mother, baby, tyrant, serf. Twenty-four honest questions about who really runs your relationship.">
<meta property="og:image" content="og-relationship.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Who does what — Two of Us, Part I">
<meta name="twitter:description" content="Mother, baby, tyrant, serf. Twenty-four honest questions about who really runs your relationship.">
<meta name="twitter:image" content="og-relationship.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  /* per-quiz palette overrides only — everything else lives in shared.css */
  :root {
    --bg: #FFF1E0;
    --ink: #1F1226;
    --accent: #FF4D7E;
    --accent-soft: #FFDDE6;
    --p2-color: #FF4D7E;

    --opt1-bg: #FFDDE6;       /* pink-soft */
    --opt2-bg: #B8E8C8;       /* mint */

    --quad-tl: #B8E8C8;       /* Caretaker — mint */
    --quad-tr: #FFDDE6;       /* Matriarch — pink-soft */
    --quad-bl: #E8DFFF;       /* Puppy — lilac */
    --quad-br: #FFD66B;       /* Royal Baby — yellow */

    --bg-glow-1: rgba(255,77,126,0.10);
    --bg-glow-2: rgba(184,232,200,0.22);

    --ink-soft:  rgba(31,18,38,0.72);
    --ink-muted: rgba(31,18,38,0.55);
    --ink-faint: rgba(31,18,38,0.45);
    --ink-fade:  rgba(31,18,38,0.28);
    --ink-tint:  rgba(31,18,38,0.08);
  }
  /* archetype-specific verdict tints */
  .verdict.matriarch { background: var(--quad-tr); }
  .verdict.caretaker { background: var(--quad-tl); }
  .verdict.royalbaby { background: var(--quad-br); }
  .verdict.puppy     { background: var(--quad-bl); }
</style>
</head>
<body>
<div class="stage">

  <!-- INTRO -->
  <section class="screen active" id="screen-intro">
    <div class="eyebrow" id="introEyebrow">A relationship diagnostic</div>
    <h1 class="title" id="introTitle">Who does <em>what</em>?</h1>
    <p class="lede" id="introLede">Twenty-four honest questions across two axes — care direction and whose preferences win. At the end you'll see exactly where you both land.</p>

    <div class="name-fields">
      <div class="field">
        <label id="label-name1">Your name</label>
        <input id="name1" type="text" placeholder="You" maxlength="18" autocomplete="off" />
      </div>
      <div class="field">
        <label id="label-name2">Their name</label>
        <input id="name2" type="text" placeholder="Your partner" maxlength="18" autocomplete="off" />
      </div>
    </div>
    <button class="btn" id="beginBtn">Begin →</button>
  </section>

  <!-- QUESTION -->
  <section class="screen" id="screen-question">
    <div class="q-header">
      <div class="q-count" id="qCount">01 / 24</div>
      <div class="progress"><div class="progress-bar" id="progBar"></div></div>
    </div>
    <div class="q-pov" id="qPov" style="display:none;"></div>
    <h2 class="question" id="qText">…</h2>
    <div class="options">
      <button class="option" id="opt1"></button>
      <button class="option" id="opt2"></button>
    </div>
    <button class="tie-link" id="tieBtn">Honestly equal — skip</button>
  </section>

  <!-- RESULTS (rendered by engine.js into #resultsContainer) -->
  <section class="screen" id="screen-results">
    <div id="resultsContainer"></div>
  </section>

</div>

<script>
window.QUIZ = {
  id: "relationship",
  title: 'Who does <em>what</em>?',
  intro: "Twenty-four honest questions across two axes — care direction (mother / baby) and whose preferences win (tyrant / serf). At the end you'll see exactly where you both land.",

  axes: {
    // Y-axis: top vs bottom of chart.
    y: { pos: "mother", neg: "baby",  posLabel: "Mother", negLabel: "Baby" },
    // X-axis: right vs left of chart.
    x: { pos: "tyrant", neg: "serf",  posLabel: "Tyrant", negLabel: "Serf" },
  },

  questions: [
    { text: "Who packs snacks 'just in case'?",                              axis: "mother" },
    { text: "Who picks the restaurant?",                                     axis: "tyrant" },
    { text: "Who falls asleep on the other in the car or on the couch?",     axis: "baby"   },
    { text: "Who says 'whatever you want' — and means it?",                  axis: "serf"   },

    { text: "Who texts 'did you eat today?' or 'let me know when you land'?", axis: "mother" },
    { text: "Who controls the thermostat or AC remote?",                     axis: "tyrant" },
    { text: "Who hands packages to the other to open?",                      axis: "baby"   },
    { text: "Who apologizes first after a fight?",                           axis: "serf"   },

    { text: "Who remembers the other's mom's birthday?",                     axis: "mother" },
    { text: "Who picks the show on TV?",                                     axis: "tyrant" },
    { text: "Who throws a hangry tantrum?",                                  axis: "baby"   },
    { text: "Who carries the bags?",                                         axis: "serf"   },

    { text: "Who notices when the other is quiet and asks what's wrong?",    axis: "mother" },
    { text: "Who orders for the table at a restaurant?",                     axis: "tyrant" },
    { text: "Who lets the other deal with the waiter or customer service?",  axis: "baby"   },
    { text: "Who reshuffles their schedule to fit the other's?",             axis: "serf"   },

    { text: "Who saves the last bite or the unbroken cookie for the other?", axis: "mother" },
    { text: "Who decides when to leave a party?",                            axis: "tyrant" },
    { text: "Who says 'where's my…' while it's right in front of them?",     axis: "baby"   },
    { text: "Who sits through shows they don't enjoy?",                      axis: "serf"   },

    { text: "Who books appointments the other keeps putting off?",           axis: "mother" },
    { text: "Whose aesthetic does the home quietly run on?",                 axis: "tyrant" },
    { text: "Who eats off the other's plate?",                               axis: "baby"   },
    { text: "Who gives up the window seat, the aux cord, the last word?",    axis: "serf"   }
  ],

  // Keyed "<yKey>+<xKey>": 4 combinations.
  archetypes: {
    "mother+tyrant": {
      emoji: "👑🍼",
      name: "The Matriarch",
      blurb: "Runs the show, packs the snacks, picks the movie. Loving but unmistakably in charge — God bless.",
      klass: "matriarch"
    },
    "mother+serf": {
      emoji: "🌷",
      name: "The Caretaker",
      blurb: "Will do anything for you and ask for nothing back. A walking saint with a tote bag full of band-aids.",
      klass: "caretaker"
    },
    "baby+tyrant": {
      emoji: "👶👑",
      name: "The Royal Baby",
      blurb: "Demands snacks. Picks the restaurant. Will not be cold. Somehow gets away with all of it because they're so cute about it.",
      klass: "royalbaby"
    },
    "baby+serf": {
      emoji: "🐶",
      name: "The Puppy",
      blurb: "Easy, breezy, agreeable. Whatever you want, sweetie. Asleep on the couch by 9pm.",
      klass: "puppy"
    }
  },

  quadLabels: {
    tl: "Caretaker",
    tr: "Matriarch",
    bl: "Puppy",
    br: "Royal Baby"
  },

  copy: {
    eyebrow: "A relationship diagnostic",
    resultsHead: "Here's the <em>truth</em>.",
    footerNote: "Diagnosis is non-binding. Probably."
  }
};
</script>
<script src="engine.js"></script>
</body>
</html>
