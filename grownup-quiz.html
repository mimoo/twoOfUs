<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Who's the grown-up?</title>

<!-- Open Graph / Twitter -->

<meta name="twitter:card" content="summary_large_image">

<meta name="twitter:description" content="Mature, immature, aware, unaware. The hard one. Be honest — these cut a little closer.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  /* per-quiz palette overrides only — everything else lives in shared.css */
  :root {
    --bg: #F5F1E8;
    --ink: #1A2238;
    --accent: #D67651;          /* clay / terracotta */
    --accent-soft: #F4D4C2;     /* peach */
    --p2-color: #D67651;

    --opt1-bg: #F4D4C2;         /* clay-soft */
    --opt2-bg: #B8D8D3;         /* sage */

    --quad-tl: #B8D8D3;         /* Mature + Unaware = Mellow — sage */
    --quad-tr: #F4D4C2;         /* Mature + Aware = Sage — clay-soft */
    --quad-bl: #C9C2DD;         /* Immature + Unaware = Storm — lavender */
    --quad-br: #F0D88A;         /* Immature + Aware = Diarist — butter */

    --bg-glow-1: rgba(214,118,81,0.10);
    --bg-glow-2: rgba(184,216,211,0.30);

    --ink-soft:  rgba(26,34,56,0.72);
    --ink-muted: rgba(26,34,56,0.55);
    --ink-faint: rgba(26,34,56,0.45);
    --ink-fade:  rgba(26,34,56,0.28);
    --ink-tint:  rgba(26,34,56,0.08);
  }
  /* archetype-specific verdict tints */
  .verdict.sage    { background: var(--quad-tr); }
  .verdict.mellow  { background: var(--quad-tl); }
  .verdict.diarist { background: var(--quad-br); }
  .verdict.storm   { background: var(--quad-bl); }
</style>
</head>
<body>
<div class="stage">

  <!-- INTRO -->
  <section class="screen active" id="screen-intro">
    <div class="eyebrow" id="introEyebrow">Part three — the hard one</div>
    <h1 class="title" id="introTitle">Who's the <em>grown-up</em>?</h1>
    <p class="lede" id="introLede">Twenty-four questions on the trickier axes — emotional maturity and self-awareness. Be honest. These ones cut a little closer.</p>

    <div class="name-fields">
      <div class="field">
        <label id="label-name1">Your name</label>
        <input id="name1" type="text" placeholder="You" maxlength="18" autocomplete="off" />
      </div>
      <div class="field">
        <label id="label-name2">Their name</label>
        <input id="name2" type="text" placeholder="Your partner" maxlength="18" autocomplete="off" />
      </div>
    </div>
    <button class="btn" id="beginBtn">Begin →</button>
  </section>

  <!-- QUESTION -->
  <section class="screen" id="screen-question">
    <div class="q-header">
      <div class="q-count" id="qCount">01 / 24</div>
      <div class="progress"><div class="progress-bar" id="progBar"></div></div>
    </div>
    <div class="q-pov" id="qPov" style="display:none;"></div>
    <h2 class="question" id="qText">…</h2>
    <div class="options">
      <button class="option" id="opt1"></button>
      <button class="option" id="opt2"></button>
    </div>
    <button class="tie-link" id="tieBtn">Honestly equal — skip</button>
  </section>

  <!-- RESULTS (rendered by engine.js into #resultsContainer) -->
  <section class="screen" id="screen-results">
    <div id="resultsContainer"></div>
  </section>

</div>

<script>
window.QUIZ = {
  id: "grownup",
  title: "Who's the <em>grown-up</em>?",
  intro: "Twenty-four questions on the trickier axes — emotional maturity and self-awareness. Be honest. These ones cut a little closer.",

  axes: {
    // Y-axis: top vs bottom of chart.
    y: { pos: "mature", neg: "immature", posLabel: "Mature", negLabel: "Immature" },
    // X-axis: right vs left of chart.
    x: { pos: "aware",  neg: "unaware",  posLabel: "Aware",  negLabel: "Unaware"  },
  },

  questions: [
    { text: "Who apologizes for the actual thing they did, not 'if you felt hurt'?", axis: "mature"   },
    { text: "Who notices their own pattern? ('I get like this when I'm tired')",     axis: "aware"    },
    { text: "Who sulks when they don't get their way?",                              axis: "immature" },
    { text: "Who's surprised by feedback they really should've seen coming?",        axis: "unaware"  },

    { text: "Who can hear hard feedback without immediately defending themselves?",  axis: "mature"   },
    { text: "Who can name what they did wrong before being told?",                   axis: "aware"    },
    { text: "Who keeps a mental list of past grievances?",                           axis: "immature" },
    { text: "Who insists they're fine when they obviously aren't?",                  axis: "unaware"  },

    { text: "Who recovers from upset in hours rather than days?",                    axis: "mature"   },
    { text: "Who admits their own hypocrisies out loud?",                            axis: "aware"    },
    { text: "Who goes silent instead of saying what's actually wrong?",              axis: "immature" },
    { text: "Who's the last to notice they're in a bad mood?",                       axis: "unaware"  },

    { text: "Who can be wrong about something without it ruining their day?",        axis: "mature"   },
    { text: "Who knows what they're not good at?",                                   axis: "aware"    },
    { text: "Who turns small disagreements into bigger ones?",                       axis: "immature" },
    { text: "Who can't quite see how they come across to others?",                   axis: "unaware"  },

    { text: "Who stays calm when the other one is escalating?",                      axis: "mature"   },
    { text: "Who warns the other when they're in a bad mood?",                       axis: "aware"    },
    { text: "Who needs the other person to fix their bad mood?",                     axis: "immature" },
    { text: "Who tells the same story without seeing their own role in it?",         axis: "unaware"  },

    { text: "Who lets minor mistakes stay minor?",                                   axis: "mature"   },
    { text: "Who can describe their actual feelings, not just 'fine' or 'annoyed'?", axis: "aware"    },
    { text: "Who has to 'win' the argument?",                                        axis: "immature" },
    { text: "Who has a self-image that doesn't quite match how others see them?",    axis: "unaware"  }
  ],

  // Keyed "<yKey>+<xKey>": 4 combinations.
  archetypes: {
    "mature+aware": {
      emoji: "🦉",
      name: "The Sage",
      blurb: "Owns their stuff, regulates beautifully, repairs honestly. Knows themselves and acts accordingly. Therapy enrichment for everyone they love.",
      klass: "sage"
    },
    "mature+unaware": {
      emoji: "🌿",
      name: "The Mellow",
      blurb: "Even-keeled and easy to be around — but introspection isn't really their hobby. The vibes are immaculate, the inner monologue is mercifully short.",
      klass: "mellow"
    },
    "immature+aware": {
      emoji: "📓",
      name: "The Diarist",
      blurb: "Sees the pattern in real time, sometimes mid-spiral. Can narrate exactly what they're doing and why. Will absolutely do it again on Tuesday.",
      klass: "diarist"
    },
    "immature+unaware": {
      emoji: "⛈️",
      name: "The Storm",
      blurb: "Big feelings arrive without warning, and so do they. The reflection comes later, if at all. Honest, intense, and reliably human.",
      klass: "storm"
    }
  },

  quadLabels: {
    tl: "The Mellow",
    tr: "The Sage",
    bl: "The Storm",
    br: "The Diarist"
  },

  copy: {
    eyebrow: "Part three — the hard one",
    resultsHead: "Here's the <em>truth</em>.",
    footerNote: "Affectionate teasing. Not therapy."
  }
};
</script>
<script src="engine.js"></script>
</body>
</html>
